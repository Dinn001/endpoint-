<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinns API Admin PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  margin:0;
  color:white;
  min-height:100vh;
  background:linear-gradient(-45deg,#020617,#1e1b4b,#0f172a,#000);
  background-size:400% 400%;
  animation:bg 18s ease infinite;
}

@keyframes bg{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.center{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:90%;
  max-width:380px;
  padding:26px;
  border-radius:20px;
  background:rgba(15,23,42,.85);
  border:1px solid rgba(139,92,246,.3);
  backdrop-filter:blur(10px);
}

h1{margin:0 0 16px;text-align:center}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(139,92,246,.3);
  background:#020617;
  color:white;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  color:white;
  font-weight:600;
  cursor:pointer;
}

.panel{
  display:none;
  padding:16px;
}

.header{
  font-size:22px;
  font-weight:700;
  margin-bottom:14px;
}

.statbox{
  display:flex;
  gap:10px;
  margin-bottom:14px;
}

.stat{
  flex:1;
  background:#020617;
  padding:14px;
  border-radius:14px;
  text-align:center;
  border:1px solid rgba(139,92,246,.3);
}

.table{
  background:#020617;
  border-radius:16px;
  overflow:auto;
  border:1px solid rgba(139,92,246,.3);
}

table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px;text-align:left}
th{background:#0f172a}
tr:not(:last-child){border-bottom:1px solid rgba(139,92,246,.2)}

.logout{
  margin-bottom:10px;
  background:#7c3aed;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="center" id="login">
  <div class="card">
    <h1>👑 Admin Login</h1>
    <input id="apikey" placeholder="Masukkan API Key Owner">
    <button onclick="login()">Masuk</button>
  </div>
</div>

<!-- PANEL -->
<div class="panel" id="panel">

  <button class="logout" onclick="logout()">Logout</button>

  <div class="header">👑 Dinns API Admin Panel PRO</div>

  <div class="statbox">
    <div class="stat">
      <div id="total">0</div>
      Total Key
    </div>
    <div class="stat">
      <div id="active">0</div>
      Active
    </div>
  </div>

  <button onclick="loadData()">🔄 Refresh</button>

  <div class="table">
    <table>
      <thead>
        <tr>
          <th>API Key</th>
          <th>User</th>
          <th>Role</th>
          <th>Limit</th>
          <th>Used</th>
          <th>Sisa</th>
        </tr>
      </thead>
      <tbody id="data"></tbody>
    </table>
  </div>

</div>

<script>

const loginDiv=document.getElementById("login")
const panel=document.getElementById("panel")

let ADMIN_KEY=""

function login(){
  const key=document.getElementById("apikey").value.trim()
  if(!key) return alert("Masukkan API key")

  ADMIN_KEY=key

  loginDiv.style.display="none"
  panel.style.display="block"

  loadData()
}

function logout(){location.reload()}

async function loadData(){

  try{

    const res=await fetch(`/api/admin?apikey=${ADMIN_KEY}`)
    const json=await res.json()

    if(!json.success){
      alert("Unauthorized / Bukan owner")
      logout()
      return
    }

    const users=json.data
    const tbody=document.getElementById("data")

    tbody.innerHTML=""

    let total=0
    let active=0

    for(const key in users){

      const u=users[key]
      const sisa=u.limit===Infinity?"∞":(u.limit-u.used)

      if(u.used>0) active++
      total++

      tbody.innerHTML+=`
      <tr>
        <td>${key}</td>
        <td>${u.name}</td>
        <td>${u.role}</td>
        <td>${u.limit===Infinity?"∞":u.limit}</td>
        <td>${u.used}</td>
        <td>${sisa}</td>
      </tr>`
    }

    document.getElementById("total").innerText=total
    document.getElementById("active").innerText=active

  }catch{
    alert("Gagal ambil data API")
  }

}

</script>

</body>
</html>
