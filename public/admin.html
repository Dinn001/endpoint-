<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dinns API — Admin Panel PRO</title>

<style>
body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:Inter, sans-serif;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
  border:1px solid #334155;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #334155;
  background:#020617;
  color:#fff;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#8b5cf6;
  color:white;
  cursor:pointer;
  margin-right:8px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th, td{
  padding:10px;
  border-bottom:1px solid #334155;
  text-align:left;
}

.badge{
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}

.owner{ background:#22c55e; }
.premium{ background:#3b82f6; }
.free{ background:#64748b; }

.stat{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.stat div{
  background:#020617;
  padding:15px;
  border-radius:12px;
  flex:1;
  text-align:center;
}

.hidden{ display:none; }
</style>
</head>
<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h2>🔐 Admin Login</h2>
    <input id="keyInput" placeholder="Owner API Key">
    <button onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden">

    <h1>👑 Dinns API Admin Panel PRO</h1>

    <button onclick="logout()">Logout</button>

    <!-- STATS -->
    <div class="stat">
      <div>
        <h2 id="totalUsers">0</h2>
        <small>Total Key</small>
      </div>
      <div>
        <h2 id="activeUsers">0</h2>
        <small>Active</small>
      </div>
      <div>
        <h2 id="limitUsers">0</h2>
        <small>Limit Habis</small>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card">
      <button onclick="loadData()">🔄 Refresh</button>

      <table>
        <thead>
          <tr>
            <th>API Key</th>
            <th>User</th>
            <th>Role</th>
            <th>Limit</th>
            <th>Used</th>
            <th>Sisa</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

    </div>

  </div>

</div>

<script>

let ownerKey = "";

// LOGIN
function login(){
  ownerKey = document.getElementById("keyInput").value;
  if(!ownerKey) return alert("Masukkan API Key");

  localStorage.setItem("admin_key", ownerKey);

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  loadData();
}

function logout(){
  localStorage.removeItem("admin_key");
  location.reload();
}

// AUTO LOGIN
const saved = localStorage.getItem("admin_key");
if(saved){
  ownerKey = saved;
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  loadData();
}

// LOAD DATA
async function loadData(){

  const res = await fetch(`/api/admin/users?apikey=${ownerKey}`);
  const json = await res.json();

  if(!json.success){
    alert("Unauthorized");
    logout();
    return;
  }

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  let active = 0;
  let limit = 0;

  json.data.forEach(u => {

    const sisa = u.limit === Infinity
      ? "∞"
      : u.limit - u.used;

    if(u.active) active++;
    if(sisa <= 0 && u.limit !== Infinity) limit++;

    tbody.innerHTML += `
      <tr>
        <td>${u.key}</td>
        <td>${u.name}</td>
        <td><span class="badge ${u.role}">${u.role}</span></td>
        <td>${u.limit === Infinity ? "∞" : u.limit}</td>
        <td>${u.used}</td>
        <td>${sisa}</td>
        <td>${u.active ? "🟢 Aktif" : "🔴 Nonaktif"}</td>
      </tr>
    `;
  });

  document.getElementById("totalUsers").innerText = json.total;
  document.getElementById("activeUsers").innerText = active;
  document.getElementById("limitUsers").innerText = limit;
}

</script>

</body>
</html>
