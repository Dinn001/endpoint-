<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinns API</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  margin:0;
  background:linear-gradient(-45deg,#0b1020,#1e1b4b,#0f172a,#020617);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
  color:white;
  min-height:100vh;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.header{
text-align:center;
padding:28px;
font-size:28px;
font-weight:600;
}

.api-key-box{padding:0 16px 12px}

input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid rgba(139,92,246,0.25);
background:#0b1220;
color:white;
margin-bottom:12px;
font-size:14px;
outline:none;
}

input:focus{
border-color:#8b5cf6;
box-shadow:0 0 0 2px rgba(139,92,246,.25);
}

.category-scroll{
display:flex;
gap:12px;
overflow-x:auto;
padding:10px 16px 22px;
}

.category-btn{
padding:10px 18px;
border-radius:24px;
background:#0f172a;
cursor:pointer;
white-space:nowrap;
border:1px solid rgba(139,92,246,.2);
}

.category-btn.active{
background:linear-gradient(90deg,#8b5cf6,#6366f1);
box-shadow:0 0 18px rgba(139,92,246,.6);
border:none;
}

.container{padding:0 16px 50px}

.card{
background:rgba(15,23,42,.85);
backdrop-filter:blur(8px);
border-radius:20px;
padding:20px;
margin-bottom:16px;
border:1px solid rgba(139,92,246,.2);
}

.badge{
color:#22c55e;
border:1px solid #22c55e;
padding:4px 10px;
border-radius:10px;
font-size:12px;
display:inline-block;
margin-bottom:10px;
}

.desc{color:#cbd5e1;font-size:14px;margin-top:6px;}

.btn{
background:linear-gradient(90deg,#8b5cf6,#6366f1);
padding:14px;
border:none;
border-radius:14px;
color:white;
font-weight:500;
cursor:pointer;
width:100%;
margin-top:10px;
}

.code{
position:relative;
background:#020617;
padding:18px;
border-radius:14px;
font-size:13px;
margin-top:14px;
white-space:pre-wrap;
word-break:break-all;
overflow:auto;
border:1px solid rgba(139,92,246,.2);
font-family:ui-monospace, monospace;
}

.copy-btn{
position:absolute;
top:10px;
right:10px;
background:#111827;
border:1px solid rgba(139,92,246,.3);
color:#cbd5e1;
border-radius:8px;
padding:6px 10px;
font-size:12px;
cursor:pointer;
}

.back{cursor:pointer;margin-bottom:15px;color:#a78bfa}

.request-info{
background:#020617;
padding:14px;
border-radius:14px;
border:1px solid rgba(139,92,246,.3);
margin-top:14px;
font-size:13px;
line-height:1.6;
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#8b5cf6;
padding:10px 16px;
border-radius:12px;
font-size:14px;
opacity:0;
transition:.3s;
}

.toast.show{opacity:1}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">Dinns API</div>

<div class="api-key-box">
<input id="globalKey" placeholder="Global API Key">
<input id="searchBox" placeholder="Search endpoint...">
</div>

<div class="category-scroll" id="categoryScroll"></div>

<div class="container">
<div id="listView"></div>
<div id="detailView" class="hidden"></div>
</div>

<div id="toast" class="toast">Copied ✓</div>

<script>
const apiConfig = {
search:{
youtube:{desc:"Cari video YouTube",params:["q"]},
pinterest:{desc:"Cari gambar Pinterest",params:["q"]},
ttsearch:{desc:"Cari video TikTok",params:["q"]},
gimage:{desc:"Cari gambar Google Image",params:["q"]},
jadwalsholat:{desc:"Jadwal sholat",params:["q"]},
surah:{desc:"Surah Al-Quran",params:["surah"]}
}
};

const globalKey=document.getElementById("globalKey");
const searchBox=document.getElementById("searchBox");
const categoryScroll=document.getElementById("categoryScroll");
const listView=document.getElementById("listView");
const detailView=document.getElementById("detailView");
const toast=document.getElementById("toast");

let currentCategory="all";
let searchText="";

searchBox.oninput=e=>{
searchText=e.target.value.toLowerCase();
renderList(currentCategory);
};

function showToast(){
toast.classList.add("show");
setTimeout(()=>toast.classList.remove("show"),1500);
}

function copyById(id){
navigator.clipboard.writeText(
document.getElementById(id).innerText
).then(showToast);
}

function generateCategories(){
categoryScroll.innerHTML="";
const allBtn=createBtn("ALL","all");
allBtn.classList.add("active");
categoryScroll.appendChild(allBtn);

for(const c in apiConfig){
categoryScroll.appendChild(createBtn(c.toUpperCase(),c));
}
}

function createBtn(text,val){
const btn=document.createElement("div");
btn.className="category-btn";
btn.innerText=text;
btn.onclick=(e)=>selectCategory(val,btn);
return btn;
}

function selectCategory(cat,el){
document.querySelectorAll(".category-btn")
.forEach(b=>b.classList.remove("active"));
el.classList.add("active");
currentCategory=cat;
renderList(cat);
}

function renderList(filter="all"){
listView.innerHTML="";
detailView.classList.add("hidden");
listView.classList.remove("hidden");

for(const c in apiConfig){
if(filter!=="all"&&c!==filter)continue;

for(const ep in apiConfig[c]){
const data=apiConfig[c][ep];
const full=(c+" "+ep).toLowerCase();
if(searchText&&!full.includes(searchText))continue;

const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div class="badge">GET</div>
<div><b>${c.toUpperCase()} / ${ep}</b></div>
<div class="desc">${data.desc}</div>
`;
card.onclick=()=>openDetail(c,ep);
listView.appendChild(card);
}
}
}

function openDetail(c,ep){
listView.classList.add("hidden");
detailView.classList.remove("hidden");

const data=apiConfig[c][ep];

detailView.innerHTML=`
<div class="card">
<div class="back" onclick="renderList('${currentCategory}')">← Back</div>
<h2>${c} / ${ep}</h2>
<p class="desc">${data.desc}</p>
<div id="formArea"></div>
<button class="btn" onclick="executeRequest('${c}','${ep}')">Execute Request</button>
<div id="resultArea"></div>
</div>`;

const formArea=document.getElementById("formArea");

data.params.forEach(p=>{
const input=document.createElement("input");
input.placeholder="Parameter: "+p;
input.id="param-"+p;
formArea.appendChild(input);
});
}

async function executeRequest(c,ep){

const apikey=globalKey.value;
if(!apikey)return alert("Isi API Key dulu!");

const data=apiConfig[c][ep];
const resultArea=document.getElementById("resultArea");

let query=`?apikey=${encodeURIComponent(apikey)}`;

data.params.forEach(p=>{
const val=document.getElementById("param-"+p)?.value||"";
query+=`&${p}=${encodeURIComponent(val)}`;
});

const url=`${window.location.origin}/api/${c}/${ep}${query}`;

resultArea.innerHTML="Memproses...";

try{

const res=await fetch(url);
const text=await res.text();

let json;

try{
json=JSON.parse(text);
}catch{
resultArea.innerHTML=`
<div class="code" style="color:#ff4444">
⚠️ Server tidak mengembalikan JSON<br><br>${text}
</div>`;
return;
}

resultArea.innerHTML=`

<div class="request-info">
<b>Request Info</b><br>
Method : GET<br>
Category : ${c}<br>
Endpoint : ${ep}<br>
URL : ${url}
</div>

<div class="code">
<button class="copy-btn" onclick="copyById('resCode')">Copy</button>
<b style="color:#8b5cf6">JSON RESPONSE:</b><br><br>
<span id="resCode">${JSON.stringify(json,null,2)}</span>
</div>
`;

}catch(err){
resultArea.innerHTML=
`<div class="code" style="color:#ff4444">${err.message}</div>`;
}
}

generateCategories();
renderList();
</script>

</body>
</html>
