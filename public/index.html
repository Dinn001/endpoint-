<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinns API</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  margin:0;
  background:linear-gradient(-45deg,#0b1020,#1e1b4b,#0f172a,#020617);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.header{
  text-align:center;
  padding:28px;
  font-size:28px;
  font-weight:600;
}

/* Inputs */

.api-key-box{padding:0 16px 12px}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(139,92,246,0.25);
  background:#0b1220;
  color:white;
  margin-bottom:12px;
  font-size:14px;
  outline:none;
  transition:.25s;
}

input:focus{
  border-color:#8b5cf6;
  box-shadow:0 0 0 2px rgba(139,92,246,.25);
}

/* Categories */

.category-scroll{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px 16px 22px;
}

.category-btn{
  padding:10px 18px;
  border-radius:24px;
  background:#0f172a;
  cursor:pointer;
  white-space:nowrap;
  border:1px solid rgba(139,92,246,.2);
  transition:.25s;
}

.category-btn.active{
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  box-shadow:0 0 18px rgba(139,92,246,.6);
  border:none;
}

/* Container */

.container{padding:0 16px 50px}

/* Cards */

.card{
  background:rgba(15,23,42,.85);
  backdrop-filter:blur(8px);
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
  border:1px solid rgba(139,92,246,.2);
  transition:.25s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 30px rgba(139,92,246,.45);
}

.badge{
  color:#22c55e;
  border:1px solid #22c55e;
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
  display:inline-block;
  margin-bottom:10px;
}

.desc{
  color:#cbd5e1;
  font-size:14px;
  margin-top:6px;
}

.btn{
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  padding:14px;
  border:none;
  border-radius:14px;
  color:white;
  font-weight:500;
  cursor:pointer;
  width:100%;
  font-size:15px;
}

/* Code block */

.code{
  position:relative;
  background:#020617;
  padding:18px;
  border-radius:14px;
  font-size:13px;
  margin-top:14px;

  white-space:pre;
  overflow:auto;
  max-width:100%;

  border:1px solid rgba(139,92,246,.2);

  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  line-height:1.5;
}

/* Scrollbar */

.code::-webkit-scrollbar{
  height:8px;
}

.code::-webkit-scrollbar-thumb{
  background:#6366f1;
  border-radius:10px;
}

/* Copy button */

.copy-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#111827;
  border:1px solid rgba(139,92,246,.3);
  color:#cbd5e1;
  border-radius:8px;
  padding:6px 10px;
  font-size:12px;
  cursor:pointer;
}

.copy-btn:hover{
  background:#8b5cf6;
  color:white;
}

/* Back */

.back{cursor:pointer;margin-bottom:15px;color:#a78bfa}

/* Toast */

.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#8b5cf6;
  padding:10px 16px;
  border-radius:12px;
  font-size:14px;
  opacity:0;
  transition:.3s;
}

.toast.show{opacity:1}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">Dinns API</div>

<div class="api-key-box">
  <input id="globalKey" placeholder="Global API Key">
  <input id="searchBox" placeholder="Search endpoint...">
</div>

<div class="category-scroll" id="categoryScroll"></div>

<div class="container">
  <div id="listView"></div>
  <div id="detailView" class="hidden"></div>
</div>

<div id="toast" class="toast">Copied ✓</div>

<script>

/* ===== CONFIG ===== */

const apiConfig = {

  drama:{
    search:{desc:"Cari drama berdasarkan judul",params:["q"]},
    episode:{desc:"Ambil daftar episode drama",params:["id"]}
  },

  tools:{
    unban:{desc:"Unban nomor WhatsApp",params:["number"]},
    ssweb:{desc:"Screenshot website",params:["url"]}
  },

  ai:{
    chat:{desc:"AI chat sederhana",params:["q"]},

    cici:{desc:"AI Cici (Dinns AI)",params:["prompt"]},

    perplexity:{
      desc:"AI Perplexity dengan jawaban + sumber",
      params:["prompt"]
    }
  },

  download:{
    gdrive:{desc:"Download file Google Drive",params:["url"]}
  }

};
let currentCategory="all";
let searchText="";

/* SAVE KEY */

const savedKey=localStorage.getItem("apikey");
if(savedKey) globalKey.value=savedKey;

globalKey.oninput=e=>{
  localStorage.setItem("apikey",e.target.value);
};

/* SEARCH */

searchBox.oninput=e=>{
  searchText=e.target.value.toLowerCase();
  renderList(currentCategory);
};

/* TOAST */

function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

/* COPY */

function copyText(text){
  navigator.clipboard.writeText(text);
  showToast();
}

/* CATEGORY */

function generateCategories(){

  const allBtn=createBtn("ALL","all");
  allBtn.classList.add("active");
  categoryScroll.appendChild(allBtn);

  for(const c in apiConfig){
    categoryScroll.appendChild(createBtn(c.toUpperCase(),c));
  }
}

function createBtn(text,val){
  const btn=document.createElement("div");
  btn.className="category-btn";
  btn.innerText=text;
  btn.onclick=()=>selectCategory(val,btn);
  return btn;
}

function selectCategory(cat,el){
  document.querySelectorAll(".category-btn")
    .forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  currentCategory=cat;
  renderList(cat);
}

/* LIST */

function renderList(filter="all"){

  listView.innerHTML="";
  detailView.classList.add("hidden");
  listView.classList.remove("hidden");

  for(const c in apiConfig){

    if(filter!=="all" && c!==filter) continue;

    for(const ep in apiConfig[c]){

      const data=apiConfig[c][ep];
      const name=(c+" "+ep).toLowerCase();

      if(searchText && !name.includes(searchText)) continue;

      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <div class="badge">GET</div>
        <div><b>${c} / ${ep}</b></div>
        <div class="desc">${data.desc}</div>
      `;
      card.onclick=()=>openDetail(c,ep);

      listView.appendChild(card);
    }
  }
}

/* DETAIL */

function openDetail(c,ep){

  listView.classList.add("hidden");
  detailView.classList.remove("hidden");

  const data=apiConfig[c][ep];

  detailView.innerHTML=`
    <div class="card">
      <div class="back" onclick="renderList('${currentCategory}')">← Back</div>

      <h2>${c} / ${ep}</h2>
      <div class="desc">${data.desc}</div>

      <div id="formArea"></div>

      <button class="btn" onclick="executeRequest('${c}','${ep}')">
        Execute
      </button>

      <div id="resultArea"></div>
    </div>
  `;

  data.params.forEach(p=>{
    const input=document.createElement("input");
    input.placeholder=p;
    input.id=p;
    formArea.appendChild(input);
  });
}

/* EXECUTE */

async function executeRequest(c,ep){

  const apikey=globalKey.value;
  if(!apikey) return alert("API key required");

  const data=apiConfig[c][ep];

  let query=`?apikey=${encodeURIComponent(apikey)}&`;

  data.params.forEach((p,i)=>{
    query+=p+"="+encodeURIComponent(document.getElementById(p).value);
    if(i<data.params.length-1) query+="&";
  });

  const url=`/api/${c}/${ep}${query}`;

  const fetchCode =
`fetch('${url}')
  .then(res => res.json())
  .then(data => console.log(data));`;

  resultArea.innerHTML="Loading...";

  const res=await fetch(url);
  const json=await res.json();

  resultArea.innerHTML=`
    <div class="code">
<button class="copy-btn" onclick="copyText(\`${fetchCode}\`)">Copy</button>
<b>REQUEST</b>

${fetchCode}
    </div>

    <div class="code">
<button class="copy-btn" onclick="copyText(\`${JSON.stringify(json,null,2)}\`)">Copy</button>
<b>RESPONSE</b>

${JSON.stringify(json,null,2)}
    </div>
  `;
}

/* INIT */

generateCategories();
renderList();

</script>

</body>
</html>
