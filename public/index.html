<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinns API</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  margin:0;
  background:linear-gradient(-45deg,#0b1020,#1e1b4b,#0f172a,#020617);
  background-size:400% 400%;
  animation:bgMove 18s ease infinite;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.header{
  text-align:center;
  padding:28px;
  font-size:26px;
  font-weight:600;
}

.api-key-box{padding:0 16px 12px}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(139,92,246,.25);
  background:#0b1220;
  color:white;
  margin-bottom:12px;
}

.category-scroll{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:10px 16px 22px;
}

.category-btn{
  padding:10px 18px;
  border-radius:24px;
  background:#0f172a;
  cursor:pointer;
  white-space:nowrap;
  border:1px solid rgba(139,92,246,.2);
}

.category-btn.active{
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  box-shadow:0 0 18px rgba(139,92,246,.6);
  border:none;
}

.container{padding:0 16px 50px}

.card{
  background:rgba(15,23,42,.85);
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
  border:1px solid rgba(139,92,246,.2);
}

.badge{
  color:#22c55e;
  border:1px solid #22c55e;
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
  display:inline-block;
  margin-bottom:10px;
}

.desc{color:#cbd5e1;font-size:14px;margin-top:6px}

.btn{
  background:linear-gradient(90deg,#8b5cf6,#6366f1);
  padding:14px;
  border:none;
  border-radius:14px;
  color:white;
  font-weight:500;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

.code,.request-box{
  position:relative;
  background:#020617;
  padding:18px;
  border-radius:14px;
  font-size:13px;
  margin-top:14px;
  word-break:break-all;
  border:1px solid rgba(139,92,246,.2);
  font-family:ui-monospace,monospace;
}

.request-box{border-color:#22c55e}

.copy-btn{
  position:absolute;
  top:10px;
  right:10px;
  background:#111827;
  border:1px solid rgba(139,92,246,.3);
  color:#cbd5e1;
  border-radius:8px;
  padding:6px 10px;
  font-size:12px;
  cursor:pointer;
}

.back{cursor:pointer;margin-bottom:15px;color:#a78bfa}

.toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#8b5cf6;
  padding:10px 16px;
  border-radius:12px;
  opacity:0;
  transition:.3s;
}

.toast.show{opacity:1}

.hidden{display:none}
</style>
</head>

<body>

<div class="header">Dinns API </></div>

<div class="api-key-box">
  <input id="globalKey" placeholder="Global API Key">
  <input id="searchBox" placeholder="Search endpoint...">
</div>

<div class="category-scroll" id="categoryScroll"></div>

<div class="container">
  <div id="listView"></div>
  <div id="detailView" class="hidden"></div>
</div>

<div id="toast" class="toast">Copied ✓</div>

<script>

// ================= CONFIG =================

const apiConfig = {
  tools:{
    cekxl:{desc:"Cek Kuota XL",params:["number"]},
    ssweb:{desc:"Screenshot website",params:["url"]}
  },
  search:{
    youtube:{desc:"Cari video YouTube",params:["q"]},
    pinterest:{desc:"Cari gambar Pinterest",params:["q"]},
    ttsearch:{desc:"Cari video TikTok",params:["q"]},
    jadwalsholat:{desc:"Jadwal sholat kota",params:["q"]},
    surah:{desc:"Al-Quran Surah",params:["surah"]}
  },
  ai:{
    chat:{desc:"AI chat sederhana",params:["q"]},
    cici:{desc:"AI Cici",params:["prompt"]}
  },
  sticker:{
    brat:{desc:"Sticker brat",params:["text"]},
    emojimix:{desc:"Emoji mix",params:["emoji1","emoji2"]}
  }
};

// ================= STATE =================

const globalKey=document.getElementById("globalKey");
const searchBox=document.getElementById("searchBox");
const categoryScroll=document.getElementById("categoryScroll");
const listView=document.getElementById("listView");
const detailView=document.getElementById("detailView");
const toast=document.getElementById("toast");

let currentCategory="all";
let searchText="";

// save key
const savedKey=localStorage.getItem("apikey");
if(savedKey) globalKey.value=savedKey;

globalKey.oninput=e=>localStorage.setItem("apikey",e.target.value);

searchBox.oninput=e=>{
  searchText=e.target.value.toLowerCase();
  renderList(currentCategory);
};

// ================= UTIL =================

function showToast(){
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1500);
}

function copyById(id){
  const text=document.getElementById(id).innerText;
  navigator.clipboard.writeText(text).then(showToast);
}

// ================= CATEGORY =================

function generateCategories(){
  categoryScroll.innerHTML="";
  const allBtn=createBtn("ALL","all");
  allBtn.classList.add("active");
  categoryScroll.appendChild(allBtn);

  for(const c in apiConfig)
    categoryScroll.appendChild(createBtn(c.toUpperCase(),c));
}

function createBtn(text,val){
  const btn=document.createElement("div");
  btn.className="category-btn";
  btn.innerText=text;
  btn.onclick=()=>selectCategory(val,btn);
  return btn;
}

function selectCategory(cat,el){
  document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  currentCategory=cat;
  renderList(cat);
}

// ================= LIST =================

function renderList(filter="all"){
  listView.innerHTML="";
  detailView.classList.add("hidden");
  listView.classList.remove("hidden");

  for(const c in apiConfig){
    if(filter!=="all" && c!==filter) continue;

    for(const ep in apiConfig[c]){
      const data=apiConfig[c][ep];
      const full=(c+" "+ep).toLowerCase();
      if(searchText && !full.includes(searchText)) continue;

      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <div class="badge">GET</div>
        <b>${c.toUpperCase()} / ${ep}</b>
        <div class="desc">${data.desc}</div>
      `;
      card.onclick=()=>openDetail(c,ep);
      listView.appendChild(card);
    }
  }
}

// ================= DETAIL =================

function openDetail(c,ep){
  listView.classList.add("hidden");
  detailView.classList.remove("hidden");

  const data=apiConfig[c][ep];

  detailView.innerHTML=`
    <div class="card">
      <div class="back" onclick="renderList('${currentCategory}')">← Back</div>
      <h2>${c.toUpperCase()} / ${ep}</h2>
      <p class="desc">${data.desc}</p>
      <div id="formArea"></div>
      <button class="btn" onclick="executeRequest('${c}','${ep}')">Execute Request</button>
      <div id="resultArea"></div>
    </div>
  `;

  const form=document.getElementById("formArea");

  data.params.forEach(p=>{
    const input=document.createElement("input");
    input.placeholder="Parameter: "+p;
    input.id="param-"+p;
    form.appendChild(input);
  });
}

// ================= EXECUTE =================

async function executeRequest(c,ep){

const apikey=globalKey.value;
if(!apikey) return alert("Isi API Key dulu!");

const data=apiConfig[c][ep];
const resultArea=document.getElementById("resultArea");

let query=`?apikey=${encodeURIComponent(apikey)}`;

data.params.forEach(p=>{
  const val=document.getElementById("param-"+p)?.value||"";
  query+=`&${p}=${encodeURIComponent(val)}`;
});

const url=`${window.location.origin}/api/${c}/${ep}${query}`;

resultArea.innerHTML="Memproses...";

try{

const res=await fetch(url);
const json=await res.json();

resultArea.innerHTML=`

<div class="request-box">
<button class="copy-btn" onclick="copyById('reqUrl')">Copy</button>
<b>REQUEST URL</b><br>
<span id="reqUrl">${url}</span>
</div>

<div class="code">
<button class="copy-btn" onclick="copyById('resJson')">Copy</button>
<b style="color:#8b5cf6">JSON RESPONSE</b><br><br>
<span id="resJson">${JSON.stringify(json,null,2)}</span>
</div>
`;

}catch(err){
resultArea.innerHTML=`Error: ${err.message}`;
}

}

// ================= INIT =================

generateCategories();
renderList();

</script>

</body>
</html>
