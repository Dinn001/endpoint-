<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinns API</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Tetap Sama Seperti Milik Anda */
        *{box-sizing:border-box;font-family:'Inter',sans-serif}
        body{margin:0;background:linear-gradient(-45deg,#0b1020,#1e1b4b,#0f172a,#020617);background-size:400% 400%;animation:bgMove 18s ease infinite;color:white;min-height: 100vh;}
        @keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .header{text-align:center;padding:28px;font-size:28px;font-weight:600;}
        .api-key-box{padding:0 16px 12px}
        input{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(139,92,246,0.25);background:#0b1220;color:white;margin-bottom:12px;font-size:14px;outline:none;}
        input:focus{border-color:#8b5cf6;box-shadow:0 0 0 2px rgba(139,92,246,.25);}
        .category-scroll{display:flex;gap:12px;overflow-x:auto;padding:10px 16px 22px;}
        .category-btn{padding:10px 18px;border-radius:24px;background:#0f172a;cursor:pointer;white-space:nowrap;border:1px solid rgba(139,92,246,.2);}
        .category-btn.active{background:linear-gradient(90deg,#8b5cf6,#6366f1);box-shadow:0 0 18px rgba(139,92,246,.6);border:none;}
        .container{padding:0 16px 50px}
        .card{background:rgba(15,23,42,.85);backdrop-filter:blur(8px);border-radius:20px;padding:20px;margin-bottom:16px;border:1px solid rgba(139,92,246,.2);}
        .badge{color:#22c55e;border:1px solid #22c55e;padding:4px 10px;border-radius:10px;font-size:12px;display:inline-block;margin-bottom:10px;}
        .desc{color:#cbd5e1;font-size:14px;margin-top:6px;}
        .btn{background:linear-gradient(90deg,#8b5cf6,#6366f1);padding:14px;border:none;border-radius:14px;color:white;font-weight:500;cursor:pointer;width:100%;margin-top: 10px;}
        .code{position:relative;background:#020617;padding:18px;border-radius:14px;font-size:13px;margin-top:14px;white-space:pre-wrap;word-break: break-all;overflow:auto;border:1px solid rgba(139,92,246,.2);font-family: ui-monospace, monospace;}
        .copy-btn{position:absolute;top:10px;right:10px;background:#111827;border:1px solid rgba(139,92,246,.3);color:#cbd5e1;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer;}
        .back{cursor:pointer;margin-bottom:15px;color:#a78bfa;display: inline-block;}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#8b5cf6;padding:10px 16px;border-radius:12px;font-size:14px;opacity:0;transition:.3s;z-index: 100;}
        .toast.show{opacity:1}
        .hidden{display:none}
    </style>
</head>
<body>

<div class="header">Dinns API</div>

<div class="api-key-box">
    <input id="globalKey" placeholder="Global API Key">
    <input id="searchBox" placeholder="Search endpoint...">
</div>

<div class="category-scroll" id="categoryScroll"></div>

<div class="container">
    <div id="listView"></div>
    <div id="detailView" class="hidden"></div>
</div>

<div id="toast" class="toast">Copied ✓</div>

<script>
// 1. CONFIG API (Hanya satu deklarasi)
const apiConfig = {
    drama: {
        search: { desc: "Cari drama berdasarkan judul", params: ["q"] },
        episode: { desc: "Ambil daftar episode drama", params: ["id"] }
    },
    tools: {
        unban: { desc: "Unban nomor WhatsApp", params: ["number"] },
        ssweb: { desc: "Screenshot website", params: ["url"] },
        stokxl: { desc: "Scraping stok XL Akrab Global", params: [] },
        stokcircle: { desc: "Scraping stok Circle / XCL", params: [] }
    },
    ai: {
        chat: { desc: "AI chat sederhana", params: ["q"] },
        cici: { desc: "AI Dinns", params: ["prompt"] },
        perplexity: { desc: "AI Perplexity", params: ["prompt"] },
        turboseek: { desc: "AI TurboSeek", params: ["prompt"] },
        deepai: { desc: "AI DeepAI", params: ["prompt", "type"] }
    },
    download: {
        gdrive: { desc: "Download file Google Drive", params: ["url"] },
        facebook: { desc: "Download video Facebook / Reel", params: ["url"] },
        instagram: { desc: "Download Instagram Post / Reel", params: ["url"] },
        capcut: { desc: "Download Video Template CapCut", params: ["url"] },
        tiktok: { desc: "Download video TikTok", params: ["url"] }
    }
};

// 2. ELEMENTS & STATE
const globalKey = document.getElementById("globalKey");
const searchBox = document.getElementById("searchBox");
const categoryScroll = document.getElementById("categoryScroll");
const listView = document.getElementById("listView");
const detailView = document.getElementById("detailView");
const toast = document.getElementById("toast");

let currentCategory = "all";
let searchText = "";

// 3. STORAGE & LOGIC
const savedKey = localStorage.getItem("apikey");
if(savedKey) globalKey.value = savedKey;

globalKey.oninput = e => localStorage.setItem("apikey", e.target.value);

searchBox.oninput = e => {
    searchText = e.target.value.toLowerCase();
    renderList(currentCategory);
};

function showToast(msg = "Copied ✓") {
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1500);
}

function copyById(id) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => showToast());
}

function generateCategories() {
    categoryScroll.innerHTML = "";
    const allBtn = createBtn("ALL", "all");
    allBtn.classList.add("active");
    categoryScroll.appendChild(allBtn);

    for (const c in apiConfig) {
        categoryScroll.appendChild(createBtn(c.toUpperCase(), c));
    }
}

function createBtn(text, val) {
    const btn = document.createElement("div");
    btn.className = "category-btn";
    btn.innerText = text;
    btn.onclick = (e) => selectCategory(val, btn);
    return btn;
}

function selectCategory(cat, el) {
    document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
    currentCategory = cat;
    renderList(cat);
}

function renderList(filter = "all") {
    listView.innerHTML = "";
    detailView.classList.add("hidden");
    listView.classList.remove("hidden");

    for (const c in apiConfig) {
        if (filter !== "all" && c !== filter) continue;

        for (const ep in apiConfig[c]) {
            const data = apiConfig[c][ep];
            const fullName = (c + " " + ep).toLowerCase();
            if (searchText && !fullName.includes(searchText)) continue;

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="badge">GET</div>
                <div><b>${c.toUpperCase()} / ${ep}</b></div>
                <div class="desc">${data.desc}</div>
            `;
            card.onclick = () => openDetail(c, ep);
            listView.appendChild(card);
        }
    }
}

function openDetail(c, ep) {
    listView.classList.add("hidden");
    detailView.classList.remove("hidden");
    const data = apiConfig[c][ep];

    detailView.innerHTML = `
        <div class="card">
            <div class="back" onclick="renderList('${currentCategory}')">← Back</div>
            <h2>${c} / ${ep}</h2>
            <p class="desc">${data.desc}</p>
            <div id="formArea"></div>
            <button class="btn" onclick="executeRequest('${c}','${ep}')">Execute Request</button>
            <div id="resultArea"></div>
        </div>
    `;

    const formArea = document.getElementById("formArea");
    data.params.forEach(p => {
        const input = document.createElement("input");
        input.placeholder = "Parameter: " + p;
        input.id = "param-" + p; // ID unik agar tidak bentrok
        formArea.appendChild(input);
    });
}

async function executeRequest(c, ep) {
    const apikey = globalKey.value;
    if (!apikey) return alert("Silahkan isi API Key terlebih dahulu!");

    const data = apiConfig[c][ep];
    const resultArea = document.getElementById("resultArea");
    
    // Build Query
    let query = `?apikey=${encodeURIComponent(apikey)}`;
    data.params.forEach(p => {
        const val = document.getElementById("param-" + p)?.value || "";
        query += `&${p}=${encodeURIComponent(val)}`;
    });

    const url = `${window.location.origin}/api/${c}/${ep}${query}`;
    resultArea.innerHTML = "<p style='margin-top:20px'>Memproses...</p>";

    try {
        const res = await fetch(url);
        const json = await res.json();
        resultArea.innerHTML = `
            <div class="code">
                <button class="copy-btn" onclick="copyById('resCode')">Copy</button>
                <b style="color:#8b5cf6">JSON RESPONSE:</b><br><br>
                <span id="resCode">${JSON.stringify(json, null, 2)}</span>
            </div>`;
    } catch (err) {
        resultArea.innerHTML = `<div class="code" style="color:#ff4444">Error: ${err.message}</div>`;
    }
}

// 4. INIT
generateCategories();
renderList();
</script>

</body>
</html>
